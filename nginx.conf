# ============================================================
# Relic Hunter - nginx configuration
# Optimized for serving a Vite + Phaser.js static game
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------
    # Gzip compression
    # Significantly reduces transfer size for text-based assets.
    # Phaser.js bundles can be large, so this matters.
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ----------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------

    # Prevent the game from being embedded in iframes on other sites
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Stop browsers from MIME-sniffing the content type
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS filtering in older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control what information is sent in the Referer header
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser features the game doesn't need
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ----------------------------------------------------------
    # Static asset caching
    # Vite produces hashed filenames (e.g. index-abc123.js),
    # so these can be cached aggressively and indefinitely.
    # ----------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache other static files (images, audio, fonts) in the root
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|mp3|ogg|wav|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ----------------------------------------------------------
    # HTML files: short cache so updates propagate quickly
    # 1 hour is a good balance between performance and freshness
    # ----------------------------------------------------------
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, no-cache";
    }

    # ----------------------------------------------------------
    # SPA fallback
    # If a route doesn't match a file, serve index.html.
    # This handles direct URL access and browser refreshes.
    # ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files (e.g. .git, .env)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
