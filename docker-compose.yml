version: '3.8'

services:
  relic-hunter:
    image: ghcr.io/guardedgoods/relic-hunter:latest
    container_name: relic
    ports:
      - "8049:80"
    restart: unless-stopped

# ═══════════════════════════════════════════════════════════════════
# SYNOLOGY NAS DEPLOYMENT
# ═══════════════════════════════════════════════════════════════════
#
# 1. Open Synology Container Manager
# 2. Go to Project → Create
# 3. Name it "relic-hunter"
# 4. Paste this entire file as the docker-compose content
# 5. Click "Build & Start"
# 6. Play at http://dukestack.com:8049
#
# The image is automatically built and published to GitHub Container
# Registry whenever code is pushed to the main branch.
#
# To update to the latest version:
#   Container Manager → Project → relic-hunter → Action → Build
#   Or SSH: docker-compose pull && docker-compose up -d
# ═══════════════════════════════════════════════════════════════════
